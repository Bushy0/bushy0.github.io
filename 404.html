<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <link rel="icon" href="/images/LogoTitle.png" type="image/x-icon">

    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <!-- Boxiocns CDN Link -->
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    
    <section class="error">
        <div class="home-content">
            <a href="/404"><img src="/images/LogoJustCircle.PNG" width="75px" height="50px"></a>
            <span class="text">Website Unavailable</span>
        </div>
        <div class="home-text">
            <h1>Website Unavailable</h1>
            <br>
            <p>Bushy0.com is down for maintenance.</p>


        </div>
    </section>


    <script>
        let arrow = document.querySelectorAll(".arrow");
        for (var i = 0; i < arrow.length; i++) {
            arrow[i].addEventListener("click", (e) => {
                let arrowParent = e.target.parentElement.parentElement;//selecting main parent of arrow
                arrowParent.classList.toggle("showMenu");
            });
        }
        let sidebar = document.querySelector(".sidebar");
        let sidebarBtn = document.querySelector(".bx-menu");
        console.log(sidebarBtn);
        sidebarBtn.addEventListener("click", () => {
            sidebar.classList.toggle("close");
        });
    </script>
</body>

</html>
